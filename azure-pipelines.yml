trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubServiceConnection: 'docker'
  acrServiceConnection: 'acr'
  dockerImageName: 'mooyoungacr.azurecr.io/test-app'
  azureSubscription: 'subscription'
  azureResourceGroup: 'DEV-AKS-RG'
  kubernetesCluster: 'dev-ci-cd-aks'
  helmChartPath: 'chart'
  releaseName: 'test-app'
  dockerImageTag: '1.0.0'  # 원하는 기본 버전 (빌드마다 BuildId와 합쳐서 고유 태그 생성)

steps:
# 1️⃣ Docker 이미지 빌드 & Push
- task: Docker@2
  displayName: Build and push Docker image
  inputs:
    command: buildAndPush
    repository: $(dockerImageName)
    dockerfile: '**/Dockerfile'
    containerRegistry: $(acrServiceConnection)
    tags: $(dockerImageTag)-$(Build.BuildId)  # 매 빌드마다 고유 태그
    arguments: '--no-cache'

# 2️⃣ Helm 설치
- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

# 3️⃣ AKS에 Helm 배포
- task: HelmDeploy@0
  displayName: Deploy to AKS
  inputs:
    connectionType: 'Azure Resource Manager'
    azureSubscription: '$(azureSubscription)'
    azureResourceGroup: '$(azureResourceGroup)'
    kubernetesCluster: '$(kubernetesCluster)'
    command: 'upgrade'
    install: true
    chartType: 'FilePath'
    chartPath: '$(helmChartPath)'
    releaseName: '$(releaseName)'
    overrideValues: |
      image.repository=mooyoungacr.azurecr.io/test-app
      image.tag=1.0.0-$(Build.BuildId)
      imagePullSecrets[0].name=acr-secret



# 4️⃣ AKS credentials 가져오기
- task: AzureCLI@2
  displayName: 'Get AKS credentials'
  inputs:
    azureSubscription: '$(azureSubscription)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az aks get-credentials --resource-group $(azureResourceGroup) --name $(kubernetesCluster) --overwrite-existing

# 5️⃣ 배포 확인 (선택사항)
- script: |
    echo "Pods after deployment:"
    kubectl get pods -n default
  displayName: 'Check pods status'