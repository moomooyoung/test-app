# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: mooyoungkim # DockerHub 또는 AzureACR 서비스 커넥션 이름
  imageName: 'mooyoungkim/test-app'

steps:
- task: Docker@2
  displayName: Build and push Docker image
  inputs:
    command: buildAndPush
    repository: $(imageName)
    dockerfile: '**/Dockerfile'
    containerRegistry: $(dockerRegistryServiceConnection)
    tags: latest

- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

- task: HelmDeploy@0
  displayName: Deploy to AKS
  inputs:
    connectionType: 'Azure Resource Manager'
    azureSubscription: 'Visual Studio Enterprise 구독 - MPN' # 실제 연결된 Azure 구독 이름
    azureResourceGroup: 'DEV-AKS-RG' # AKS 리소스 그룹
    kubernetesCluster: 'dev-ci-cd-aks' # AKS 클러스터 이름
    command: 'upgrade'
    chartType: 'FilePath'
    chartPath: 'test-app/test-app' # Helm chart 실제 경로
    releaseName: 'test-app'
    overrideValues: |
      image.repository=$(imageName)
      image.tag=latest
