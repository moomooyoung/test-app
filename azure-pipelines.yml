trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubServiceConnection: 'docker'
  acrServiceConnection: 'acr'
  dockerImageName: 'mooyoungacr.azurecr.io/test-app'
  azureSubscription: 'subscription'
  azureResourceGroup: 'DEV-AKS-RG'
  kubernetesCluster: 'dev-ci-cd-aks'
  helmChartPath: 'chart'
  releaseName: 'test-app'

steps:
# 1️⃣ Docker 이미지 빌드 & Push
- task: Docker@2
  displayName: Build and push Docker image
  inputs:
    command: buildAndPush
    repository: $(dockerImageName)
    dockerfile: '**/Dockerfile'
    containerRegistry: $(acrServiceConnection)
    tags: 1.0.3  # 매 빌드마다 latest로 덮어쓰기

# 2️⃣ Helm 설치
- task: HelmInstaller@1
  displayName: Install Helm
  inputs:
    helmVersionToInstall: 'latest'

# 3️⃣ Helm 배포
- task: HelmDeploy@0
  displayName: Deploy to AKS
  inputs:
    connectionType: 'Azure Resource Manager'
    azureSubscription: '$(azureSubscription)'
    azureResourceGroup: '$(azureResourceGroup)'
    kubernetesCluster: '$(kubernetesCluster)'
    command: 'upgrade'
    install: true
    chartType: 'FilePath'
    chartPath: '$(helmChartPath)'
    releaseName: '$(releaseName)'
    overrideValues: |
  image.repository=mooyoungacr.azurecr.io/test-app
  image.tag=1.0.3
  imagePullSecrets[0].name=acr-secret


# 4️⃣ 롤링 업데이트 적용
- script: |
    kubectl rollout restart deployment test-app -n default
    kubectl get pods -n default
  displayName: 'Restart Deployment to apply new image'
