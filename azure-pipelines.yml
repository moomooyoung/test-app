trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrServiceConnection: 'acr'
  dockerImageName: 'mooyoungacr.azurecr.io/test-app'
  gitOpsRepoUrl: 'https://github.com/moomooyoung/test-app.git' # GitOps repo URL
  gitOpsRepoBranch: 'main'
  gitOpsRepoPath: 'Chart' # Helm 차트 경로
  imageTag: '$(Build.BuildId)'     # 동적 이미지 태그
  gitUserName: 'AzurePipeline'
  gitUserEmail: 'azure-pipeline@yourdomain.com'

steps:
# 1️⃣ Docker Build & Push
- task: Docker@2
  displayName: Build and push Docker image
  inputs:
    command: buildAndPush
    repository: test-app
    dockerfile: '**/Dockerfile'
    containerRegistry: $(acrServiceConnection)
    tag: $(imageTag)

# 2️⃣ GitOps Repo Update
- task: Bash@3
  displayName: Update GitOps repo with new image tag
  inputs:
    targetType: 'inline'
    script: |
      # Git 설치 확인 (Ubuntu 에이전트에는 기본 설치됨)
      git --version

      # repo clone
      git clone --branch $(gitOpsRepoBranch) $(gitOpsRepoUrl) gitops-repo
      cd gitops-repo/$(gitOpsRepoPath)

      # values.yaml 이미지 태그 수정
      sed -i 's|tag: .*|tag: $(imageTag)|' values.yaml
      sed -i 's|repository: .*|repository: $(dockerImageName)|' values.yaml

      # git config
      git config user.name "$(gitUserName)"
      git config user.email "$(gitUserEmail)"

      # commit & push
      git add values.yaml
      git commit -m "Update image to $(imageTag) via Azure Pipeline"
      git push origin $(gitOpsRepoBranch)
