replicaCount: 1

image:
  repository: mooyoungacr.azurecr.io/test-app  # ACR 이미지 저장소
  tag: 1.0.16  # 원하는 태그로 변경 가능 (예: 63)
  pullPolicy: Always

# Helm 템플릿에서 serviceAccount.imagePullSecrets와 연결
serviceAccount:
  create: true
  automount: true
  name: test-app  # ServiceAccount 이름
  annotations: {}
  imagePullSecrets:
    - name: acr-secret  # ACR 인증 시크릿

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 3000  # Node.js 앱 포트

ingress:
  enabled: false

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: 3000

readinessProbe:
  httpGet:
    path: /
    port: 3000

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
